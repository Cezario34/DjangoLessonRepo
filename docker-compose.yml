services:
  web:
    build: .
    command: gunicorn mysite.wsgi:application --bind 0.0.0.0:8000
    restart: always
    volumes:
      - .:/code
    ports:
      - "8001:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=mysite.settings.prod
      - PYTHONUNBUFFERED=1
  nginx:
    image: nginx:1.25.5
    restart: always
    volumes:
      - ./config/nginx:/etc/nginx/templates
      - .:/code
    ports:
      - "80:80"