<div class="pagination">
  {% if page.has_previous %}
    <a class="pagination__link" href="?page={{ page.previous_page_number }}">← Назад</a>
  {% endif %}

  <span class="pagination__info">
    Страница {{ page.number }} из {{ page.paginator.num_pages }}
  </span>

  {% if page.has_next %}
    <a class="pagination__link" href="?page={{ page.next_page_number }}">Вперёд →</a>
  {% endif %}
</div>
